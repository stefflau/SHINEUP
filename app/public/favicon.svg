<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fond sombre -->
  <rect width="32" height="32" rx="8" fill="#111111"/>

  <!-- Cercle soleil fond -->
  <circle cx="16" cy="16" r="10" fill="#F5C842" opacity="0.15"/>

  <!-- Rayons -->
  <line x1="16" y1="3" x2="16" y2="6" stroke="#F5C842" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="26" x2="16" y2="29" stroke="#F5C842" stroke-width="2" stroke-linecap="round"/>
  <line x1="3" y1="16" x2="6" y2="16" stroke="#F5C842" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="16" x2="29" y2="16" stroke="#F5C842" stroke-width="2" stroke-linecap="round"/>
  <line x1="6.5" y1="6.5" x2="8.6" y2="8.6" stroke="#F5C842" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23.4" y1="23.4" x2="25.5" y2="25.5" stroke="#F5C842" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23.4" y1="8.6" x2="25.5" y2="6.5" stroke="#F5C842" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6.5" y1="25.5" x2="8.6" y2="23.4" stroke="#F5C842" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Cercle -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="#F5C842" stroke-width="1.8"/>

  <!-- Lettre S -->
  <text x="16" y="20.5" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#F5C842">S</text>
</svg>
